<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ECU Mock Oral</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="header">
        <h1>ECU Mock Oral Platform</h1>
        <p class="subtitle">Administration Panel</p>
    </header>

    <nav class="admin-nav">
        <a href="/">Home</a>
        <a href="/admin" class="active">Dashboard</a>
        <a href="/admin/repository">Repository</a>
        <a href="/admin/exams">Exams</a>
        <a href="/admin/credentials">Credentials</a>
        <a href="/admin/scoring">Scoring</a>
        <a href="/admin/question-tracker">Question Tracker</a>
        <a href="/admin/settings">Settings</a>
        <form action="/admin/logout" method="POST" style="margin-left: auto; display: inline;">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="stat-exams">-</div>
                <div class="stat-label">Total Exams</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-active" style="font-size:1.2rem">-</div>
                <div class="stat-label">Active Exam</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-residents">-</div>
                <div class="stat-label">Residents Tested</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-pass-rate">-</div>
                <div class="stat-label">Overall Pass Rate</div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
            <div class="card">
                <h2 class="card-title">Upcoming Exams</h2>
                <div id="upcoming-container">Loading...</div>
            </div>
            <div class="card">
                <h2 class="card-title">Recent Exam Results</h2>
                <div id="results-container">Loading...</div>
            </div>
        </div>
    </div>

    <style>
        @media (max-width:768px) {
            .container > div[style*="grid-template-columns"] {
                grid-template-columns: 1fr !important;
            }
        }
    </style>

    <script>
        function H(s){if(s==null)return'';var o={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};return String(s).replace(/[&<>"']/g,function(c){return o[c]})}

        async function loadDashboard() {
            try {
                const response = await fetch('/admin/dashboard-data');
                const data = await response.json();

                // Stat cards
                document.getElementById('stat-exams').textContent = data.totalExams || 0;
                document.getElementById('stat-active').textContent = data.activeExam ? data.activeExam.name : 'None';
                document.getElementById('stat-residents').textContent = data.totalResidentsTested || 0;

                const rate = data.overallPassRate || 0;
                const rateEl = document.getElementById('stat-pass-rate');
                rateEl.textContent = rate + '%';
                rateEl.style.color = rate >= 70 ? '#28a745' : rate >= 50 ? '#e6a817' : '#dc3545';

                // Upcoming exams
                const upEl = document.getElementById('upcoming-container');
                if (!data.upcomingExams || data.upcomingExams.length === 0) {
                    upEl.innerHTML = '<p style="color:#999;text-align:center;padding:20px">No upcoming exams scheduled.</p>';
                } else {
                    upEl.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="border-bottom:2px solid #ddd;text-align:left"><th style="padding:8px">Exam</th><th style="padding:8px">Date</th><th style="padding:8px">Residents</th><th style="padding:8px">Rooms</th><th style="padding:8px">Status</th></tr></thead><tbody>' +
                        data.upcomingExams.map(e => '<tr style="border-bottom:1px solid #eee">' +
                            '<td style="padding:8px"><a href="/admin/exams" style="color:#003366;font-weight:500">' + H(e.name) + '</a></td>' +
                            '<td style="padding:8px">' + (H(e.date) || '-') + '</td>' +
                            '<td style="padding:8px">' + (e.residentCount || 0) + '</td>' +
                            '<td style="padding:8px">' + (e.roomCount || 0) + '</td>' +
                            '<td style="padding:8px">' + (e.is_locked ? '<span style="color:#888">Locked</span> ' : '') + (e.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-warning">Inactive</span>') + '</td>' +
                            '</tr>').join('') + '</tbody></table>';
                }

                // Recent results
                const resEl = document.getElementById('results-container');
                if (!data.recentResults || data.recentResults.length === 0) {
                    resEl.innerHTML = '<p style="color:#999;text-align:center;padding:20px">No exam results yet.</p>';
                } else {
                    resEl.innerHTML = data.recentResults.map(function(e) {
                        var total = (e.pass||0) + (e.marginal||0) + (e.fail||0);
                        var pPct = total > 0 ? ((e.pass||0)/total*100).toFixed(0) : 0;
                        var mPct = total > 0 ? ((e.marginal||0)/total*100).toFixed(0) : 0;
                        var fPct = total > 0 ? ((e.fail||0)/total*100).toFixed(0) : 0;
                        return '<div style="margin-bottom:16px">' +
                            '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">' +
                            '<strong style="font-size:14px">' + H(e.name) + '</strong>' +
                            '<span style="color:#888;font-size:12px">' + (H(e.date) || '') + '</span>' +
                            '</div>' +
                            '<div style="display:flex;height:22px;border-radius:4px;overflow:hidden;background:#eee">' +
                            (pPct > 0 ? '<div style="width:' + pPct + '%;background:#28a745" title="Pass: ' + (e.pass||0) + '"></div>' : '') +
                            (mPct > 0 ? '<div style="width:' + mPct + '%;background:#ffc107" title="Marginal: ' + (e.marginal||0) + '"></div>' : '') +
                            (fPct > 0 ? '<div style="width:' + fPct + '%;background:#dc3545" title="Fail: ' + (e.fail||0) + '"></div>' : '') +
                            '</div>' +
                            '<div style="font-size:12px;color:#666;margin-top:3px">' +
                            '<span style="color:#28a745">Pass: ' + (e.pass||0) + '</span> &nbsp;' +
                            '<span style="color:#e6a817">Marginal: ' + (e.marginal||0) + '</span> &nbsp;' +
                            '<span style="color:#dc3545">Fail: ' + (e.fail||0) + '</span>' +
                            '</div></div>';
                    }).join('');
                }

                // Show admin username in nav if there's a welcome element
                var adminNameEl = document.getElementById('admin-name');
                if (adminNameEl) adminNameEl.textContent = data.adminUsername || 'Admin';
            } catch (err) {
                console.error('Dashboard load error:', err);
            }
        }
        loadDashboard();
    </script>
</body>
</html>
